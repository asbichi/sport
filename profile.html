<!doctype html>

  </head>

    </div>

    <!-- Luxury Glassmorphism Navbar -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100 transition-all duration-300">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-20 items-center">
          <div class="flex items-center">
            <a href="/" class="flex items-center gap-3 group">
              <img src="https://i.ibb.co/bRDvmLgW/cea5b158-4e71-4446-84de-6924e17f2d51.jpg" alt="Logo" class="h-11 w-auto object-contain rounded-xl shadow-md border-2 border-orange-500/10 group-hover:border-orange-500 group-hover:scale-105 transition-all duration-300">
              <span class="text-black font-black uppercase tracking-tighter text-2xl sm:text-3xl font-display group-hover:text-orange-600 transition-colors">BICHI'S <span class="text-orange-500">WEAR</span></span>
            </a>
          </div>
          <div class="hidden md:flex space-x-10 items-center text-xs font-black uppercase tracking-[0.2em] text-gray-800 border-l border-gray-200 pl-10">
            <a href="/shop.html" class="hover:text-orange-600 transition-colors">Shop All</a>
            <a href="/shop.html" class="hover:text-orange-600 transition-colors">New Arrivals</a>
            <a href="/shop.html" class="hover:text-orange-600 transition-colors">Accessories</a>
          </div>
          <div class="flex space-x-6 items-center border-l md:border-l-0 border-gray-200 pl-6 md:pl-0">
            <div class="relative hidden lg:block">
              <input type="text" class="live-search-input bg-gray-100 border-none rounded-full py-1.5 px-4 text-xs font-bold w-40 focus:w-60 transition-all focus:outline-none focus:ring-2 focus:ring-orange-500 text-black placeholder-gray-500" placeholder="Search elite gear...">
              <svg class="w-3.5 h-3.5 absolute right-3 top-2.5 text-gray-500 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
              <div class="search-results-container absolute top-10 right-0 w-72 bg-white border border-gray-100 shadow-2xl rounded-xl z-50 hidden flex-col max-h-[60vh] overflow-y-auto"></div>
            </div>
            <a href="/login.html" id="nav-login" class="text-xs font-black uppercase tracking-widest hover:text-orange-600 transition-colors">Sign In</a>
            <a href="/profile.html" id="nav-profile" class="hidden text-xs font-black uppercase tracking-widest hover:text-orange-600 transition-colors">Profile</a>
            <button id="nav-logout" class="hidden text-xs font-black uppercase tracking-widest text-gray-500 hover:text-red-500 transition-colors">Sign Out</button>
            <a href="/admin.html" id="nav-admin" class="hidden text-[10px] font-black uppercase tracking-widest bg-black text-white px-3 py-1.5 rounded-full hover:bg-gray-800 transition-colors">Admin</a>
            <a href="/cart.html" class="flex items-center hover:text-orange-600 transition-colors group">
              <span class="text-xs font-black uppercase tracking-widest mr-2">Cart</span>
              <span id="cart-count" class="bg-gradient-to-br from-orange-600 to-amber-500 text-white text-[10px] items-center justify-center font-black w-5 h-5 flex rounded-full group-hover:scale-110 transition-transform shadow-md">0</span>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Page Header & Sliding Chips -->
    <div class="gradient-brand-glow py-16 border-b border-zinc-900 text-white relative">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 flex items-center justify-between">
        <div>
           <h1 class="text-4xl md:text-6xl font-black uppercase italic tracking-tighter text-white drop-shadow-md">My <span class="text-orange-500">Profile</span></h1>
           <p class="text-zinc-400 mt-2 font-medium tracking-wide flex items-center" id="profile-email">
              Loading user...
           </p>
        </div>
      </div>
    </div>

    <!-- Main Profile Area -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow w-full">
       <div class="mb-12">
          <h2 class="text-2xl font-black uppercase tracking-widest border-b-2 border-black inline-block pb-1 mb-8">My Wishlist</h2>
          
          <div id="wishlist-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-8">
             <div class="col-span-full py-12 text-center text-gray-500">Loading wishlist...</div>
          </div>
       </div>
    </div>

    <footer class="bg-black text-white py-12 mt-auto">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center text-xs uppercase tracking-widest font-bold text-gray-400">
        <p>&copy; 2026 BICHI'S CLOTHING. ALL RIGHTS RESERVED.</p>
        <div class="flex space-x-6 mt-4 md:mt-0">
          <a href="#" class="hover:text-white transition">Instagram</a>
          <a href="#" class="hover:text-white transition">Twitter</a>
        </div>
      </div>
    </footer>

    <script type="module" src="/src/main.tsx"></script>
    <script type="module" src="/js/firebase.js"></script>
    <script type="module" src="/js/auth.js"></script>
    <script type="module" src="/js/cart.js"></script>
    <script type="module">
      import { auth, firebaseDb, getCurrentUser } from '/js/firebase.js';
      import { currentUser } from '/js/auth.js';
      import { renderProducts } from '/js/app.js';

      const wishlistGrid = document.getElementById('wishlist-grid');

      document.addEventListener('DOMContentLoaded', () => {
         setTimeout(async () => {
             const user = await getCurrentUser();
             // user successfully identified
             
             if (!user) {
                 alert("Please log in to view your profile.");
                 window.location.href = '/login.html';
                 return;
             }
             
             document.getElementById('profile-email').innerHTML = `
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                ${user.email}
             `;

             loadWishlist(user.uid);
         }, 500); // Wait for auth init
      });

      async function loadWishlist(userId) {
          wishlistGrid.innerHTML = '<div class="col-span-full py-12 text-center text-gray-500 animate-pulse">Fetching your favorite gear...</div>';
          
          try {
              // Get Wishlist IDs
              const { data: wishlistData, error: wlError } = await firebaseDb.query('Wishlists', [['user_id', '==', userId]]);
; // loaded from Firebase successfully
                 
              if (wlError) throw wlError;

              const productIds = wishlistData.map(w => w.product_id);

              if (productIds.length === 0) {
                  wishlistGrid.innerHTML = `
                    <div class="col-span-full py-16 text-center border-2 border-dashed border-gray-200 rounded-lg">
                        <h3 class="text-xl font-bold mb-2">Your wishlist is empty</h3>
                        <p class="text-gray-500 mb-6 font-medium">Start exploring our collection and save your favorite gear here.</p>
                        <a href="/shop.html" class="bg-black text-white hover:bg-orange-600 hover:text-white font-bold uppercase tracking-widest text-sm py-4 px-8 rounded shadow-lg transition-colors inline-block">Shop Collection</a>
                    </div>
                  `;
                  return;
              }

              // Fetch products
              const { data: allProducts, error: pError } = await firebaseDb.getAll('Products');
              const products = allProducts ? allProducts.filter(p => productIds.includes(p.id)) : [];
; // matching products filtered locally

              if (pError) throw pError;
              
              if (!products || products.length === 0) {
                 wishlistGrid.innerHTML = '<div class="col-span-full py-12 text-center text-gray-500">Products no longer available.</div>';
                 return;
              }

              renderProducts(products, wishlistGrid);

          } catch (err) {
              console.error(err);
              if (err.code === '42P01') {
                 wishlistGrid.innerHTML = `
                    <div class="col-span-full py-12 text-center bg-yellow-50 text-yellow-800 rounded p-4 border border-yellow-200">
                        <p class="font-bold mb-2">Wishlists Table Missing</p>
                        <p class="text-sm">Please ask the database administrator to create the <code>Wishlists</code> table.</p>
                    </div>
                 `;
              } else {
                 wishlistGrid.innerHTML = '<div class="col-span-full py-12 text-center text-red-500">Failed to load wishlist.</div>';
              }
          }
      }
    </script>
  </body>
</html>
