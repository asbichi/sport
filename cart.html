<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Cart - BICHI'S WEAR</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans flex flex-col min-h-screen">
    
    <!-- Premium Graduated Metallic Top Banner -->
    <div class="bg-gradient-to-r from-orange-600 via-amber-500 to-orange-600 text-white text-[10px] font-black uppercase tracking-[0.25em] py-3 text-center w-full z-50 shadow-md">
        ⚡ FREE GLOBAL SHIPPING ON ORDERS OVER $100 | USE CODE: BICHIPRO ⚡
    </div>

    <!-- Luxury Glassmorphism Navbar -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100 transition-all duration-300">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-20 items-center">
          <div class="flex items-center">
            <a href="/" class="flex items-center gap-3 group">
              <img src="https://i.ibb.co/bRDvmLgW/cea5b158-4e71-4446-84de-6924e17f2d51.jpg" alt="Logo" class="h-11 w-auto object-contain rounded-xl shadow-md border-2 border-orange-500/10 group-hover:border-orange-500 group-hover:scale-105 transition-all duration-300">
              <span class="text-black font-black uppercase tracking-tighter text-2xl sm:text-3xl font-display group-hover:text-orange-600 transition-colors">BICHI'S <span class="text-orange-500">WEAR</span></span>
            </a>
          </div>
          <div class="hidden md:flex space-x-10 items-center text-xs font-black uppercase tracking-[0.2em] text-gray-800 border-l border-gray-200 pl-10">
            <a href="/shop.html" class="hover:text-orange-600 transition-colors">Shop All</a>
            <a href="/shop.html" class="hover:text-orange-600 transition-colors">New Arrivals</a>
            <a href="/shop.html" class="hover:text-orange-600 transition-colors">Accessories</a>
          </div>
          <div class="flex space-x-6 items-center border-l md:border-l-0 border-gray-200 pl-6 md:pl-0">
            <div class="relative hidden lg:block">
              <input type="text" class="live-search-input bg-gray-100 border-none rounded-full py-1.5 px-4 text-xs font-bold w-40 focus:w-60 transition-all focus:outline-none focus:ring-2 focus:ring-orange-500 text-black placeholder-gray-500" placeholder="Search elite gear...">
              <svg class="w-3.5 h-3.5 absolute right-3 top-2.5 text-gray-500 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
              <div class="search-results-container absolute top-10 right-0 w-72 bg-white border border-gray-100 shadow-2xl rounded-xl z-50 hidden flex-col max-h-[60vh] overflow-y-auto"></div>
            </div>
            <a href="/login.html" id="nav-login" class="text-xs font-black uppercase tracking-widest hover:text-orange-600 transition-colors">Sign In</a>
            <a href="/profile.html" id="nav-profile" class="hidden text-xs font-black uppercase tracking-widest hover:text-orange-600 transition-colors">Profile</a>
            <button id="nav-logout" class="hidden text-xs font-black uppercase tracking-widest text-gray-500 hover:text-red-500 transition-colors">Sign Out</button>
            <a href="/admin.html" id="nav-admin" class="hidden text-[10px] font-black uppercase tracking-widest bg-black text-white px-3 py-1.5 rounded-full hover:bg-gray-800 transition-colors">Admin</a>
            <a href="/cart.html" class="flex items-center hover:text-orange-600 transition-colors group">
              <span class="text-xs font-black uppercase tracking-widest mr-2">Cart</span>
              <span id="cart-count" class="bg-gradient-to-br from-orange-600 to-amber-500 text-white text-[10px] items-center justify-center font-black w-5 h-5 flex rounded-full group-hover:scale-110 transition-transform shadow-md">0</span>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Page Header & Sliding Chips -->
    <div class="gradient-brand-glow py-16 border-b border-zinc-900 text-white relative">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
        <h1 class="text-4xl md:text-6xl font-black uppercase italic tracking-tighter text-white drop-shadow-md">Your <span class="text-orange-500">Cart</span></h1>
        <p class="text-gray-400 mt-2 font-medium tracking-wide">Secure your elite training clothing and accessories collection.</p>
      </div>
    </div>

    <!-- Cart Content -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow">
       <div id="cart-container" class="bg-white p-6 rounded-lg shadow min-h-[300px]">
           <!-- Injected -->
       </div>
    </div>

    <script type="module" src="/js/firebase.js"></script>
    <script type="module" src="/js/auth.js"></script>
    <script type="module" src="/js/cart.js"></script>
    <script type="module">
      import { cart, removeFromCart, updateQuantity, getCartTotal } from '/js/cart.js';
      
      const cartContainer = document.getElementById('cart-container');

      function renderCart() {
          if (cart.length === 0) {
              cartContainer.innerHTML = `
                 <div class="text-center py-12">
                    <div class="text-4xl mb-4">🛒</div>
                    <h2 class="text-2xl font-bold text-gray-500 mb-4">Your cart is empty</h2>
                    <a href="/shop.html" class="bg-black hover:bg-orange-600 text-white font-bold py-2.5 px-6 rounded-full text-xs uppercase tracking-widest transition inline-block">Start Shopping</a>
                 </div>
              `;
              return;
          }

          let html = `
             <div class="overflow-x-auto -mx-6 px-6">
                 <table class="w-full text-left border-collapse min-w-[600px] md:min-w-0">
                    <thead>
                       <tr class="border-b-2 border-gray-200 uppercase tracking-widest text-xs font-bold text-gray-400">
                          <th class="py-4 font-bold">Equipment</th>
                          <th class="py-4 font-bold">Configuration</th>
                          <th class="py-4"></th>
                       </tr>
                    </thead>
                    <tbody>
          `;

          cart.forEach(item => {
             html += `
                <tr class="border-b border-gray-100 group">
                   <td class="py-6 flex items-center space-x-6">
                      <div class="w-24 h-24 bg-gray-100 rounded-xl overflow-hidden flex-shrink-0">
                          <img src="${item.image_url || 'https://via.placeholder.com/64'}" class="w-full h-full object-cover mix-blend-multiply" />
                      </div>
                      <div>
                         <span class="block font-black text-xl mb-1 uppercase tracking-tight text-gray-900">${item.product_name}</span>
                      </div>
                   </td>
                   <td class="py-6">
                      <input type="number" min="1" value="${item.quantity}" data-id="${item.id}" class="qty-input w-20 p-2 text-center text-lg font-bold border-2 border-gray-200 rounded-lg outline-none focus:border-black" />
                   </td>
                   <td class="py-6 text-right">
                      <button data-id="${item.id}" class="remove-btn text-xs font-bold uppercase tracking-widest text-gray-400 hover:text-red-500 transition-colors">X Remove</button>
                   </td>
                </tr>
             `;
          });

          html += `
                </tbody>
             </table>
            </div>
             <div class="flex justify-end mt-8 border-t-2 border-gray-200 pt-8">
                 <div class="w-full md:w-1/2 lg:w-1/3 p-6 bg-gray-50 rounded-2xl">
                    <a href="/checkout.html" class="block w-full text-center bg-black hover:bg-orange-600 hover:text-white text-white font-black uppercase tracking-widest py-4 px-6 rounded-full transition-transform hover:-translate-y-1 hover:shadow-lg shadow-sm">Secure Checkout</a>
                 </div>
             </div>
          `;

          cartContainer.innerHTML = html;

          cartContainer.querySelectorAll('.remove-btn').forEach(btn => {
             btn.addEventListener('click', (e) => {
                 removeFromCart(e.target.getAttribute('data-id'));
                 renderCart();
             });
          });

          cartContainer.querySelectorAll('.qty-input').forEach(input => {
             input.addEventListener('change', (e) => {
                 updateQuantity(e.target.getAttribute('data-id'), e.target.value);
                 renderCart();
             });
          });
      }

      document.addEventListener('DOMContentLoaded', renderCart);
    </script>
  </body>
</html>
