<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - BICHI'S WEAR</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans flex flex-col min-h-screen">
    
    <!-- Premium Graduated Metallic Top Banner -->
    <div class="bg-gradient-to-r from-orange-600 via-amber-500 to-orange-600 text-white text-[10px] font-black uppercase tracking-[0.25em] py-3 text-center w-full z-50 shadow-md">
        ⚡ FREE GLOBAL SHIPPING ON ORDERS OVER $100 | USE CODE: BICHIPRO ⚡
    </div>

    <!-- Luxury Glassmorphism Navbar -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100 transition-all duration-300">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-20 items-center">
          <div class="flex items-center">
            <a href="/" class="flex items-center gap-3 group">
              <img src="https://i.ibb.co/bRDvmLgW/cea5b158-4e71-4446-84de-6924e17f2d51.jpg" alt="Logo" class="h-11 w-auto object-contain rounded-xl shadow-md border-2 border-orange-500/10 group-hover:border-orange-500 group-hover:scale-105 transition-all duration-300">
              <span class="text-black font-black uppercase tracking-tighter text-2xl sm:text-3xl font-display group-hover:text-orange-600 transition-colors">BICHI'S <span class="text-orange-500">WEAR</span></span>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <div class="flex-grow flex items-center justify-center py-16 px-4">
      <div class="w-full max-w-md bg-white p-10 rounded-3xl border border-gray-200/60 shadow-xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-[6px] bg-gradient-to-r from-orange-600 via-amber-500 to-orange-600"></div>
        <div class="mb-10 text-center">
          <h2 class="text-3xl font-black uppercase italic tracking-tighter text-gray-950 font-display">Bichi Pro <span class="text-orange-600">Network</span></h2>
          <p class="text-gray-500 text-sm font-medium mt-2">Sign in to unlock exclusive athletic wear & gear tracking.</p>
        </div>
        
        <!-- Tabs -->
        <div class="flex mb-8 border-b-2 border-gray-100">
           <button id="tab-login" class="w-1/2 py-3 text-center text-xs font-black uppercase tracking-widest border-b-2 border-orange-600 text-orange-600 -mb-[2px] transition-colors cursor-pointer">Sign In</button>
           <button id="tab-register" class="w-1/2 py-3 text-center text-xs font-black uppercase tracking-widest text-gray-400 border-b-2 border-transparent -mb-[2px] hover:text-black transition-colors cursor-pointer">Register</button>
        </div>

        <form id="auth-form" class="space-y-5">
          <input type="hidden" id="auth-mode" value="login">
          
          <div id="register-fields" class="hidden">
             <label class="block text-[10px] font-black uppercase tracking-widest text-gray-500 mb-2">Full Name</label>
             <input id="r-name" type="text" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:border-orange-500 focus:bg-white focus:ring-0 outline-none transition font-medium text-sm text-black">
          </div>

          <div>
             <label class="block text-[10px] font-black uppercase tracking-widest text-gray-500 mb-2">Email Address</label>
             <input id="email" type="email" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:border-orange-500 focus:bg-white focus:ring-0 outline-none transition font-medium text-sm text-black">
          </div>

          <div>
             <label class="block text-[10px] font-black uppercase tracking-widest text-gray-500 mb-2">Password</label>
             <input id="password" type="password" required class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:border-orange-500 focus:bg-white focus:ring-0 outline-none transition font-medium text-sm text-black">
          </div>

          <div id="error-msg" class="text-red-500 text-xs font-bold uppercase tracking-widest hidden bg-red-50 p-4 rounded-xl border border-red-100"></div>

          <div class="pt-4">
            <button type="submit" class="w-full bg-gradient-to-r from-orange-600 via-orange-500 to-amber-500 hover:from-orange-500 hover:to-amber-400 text-white font-black uppercase tracking-widest py-4 rounded-full transition-all transform hover:-translate-y-0.5 shadow-[0_4px_15px_rgba(249,115,22,0.3)] hover:shadow-[0_8px_20px_rgba(249,115,22,0.45)] cursor-pointer">
              Continue
            </button>
          </div>
          
          <p class="text-center text-[10px] font-black uppercase tracking-widest text-gray-400 pt-6 border-t border-gray-100 flex justify-center gap-4">
            <a href="#" class="hover:text-orange-600 transition-colors">Forgot Password?</a>
            <a href="/" class="hover:text-black transition-colors">Cancel</a>
          </p>
        </form>
      </div>
    </div>

    <script type="module" src="/js/firebase.js"></script>
    <script type="module" src="/js/auth.js"></script>
    <script type="module">
      import { login, registerUser, currentUser } from '/js/auth.js';

      const tabLogin = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');
      const authMode = document.getElementById('auth-mode');
      const registerFields = document.getElementById('register-fields');
      const form = document.getElementById('auth-form');
      const errorMsg = document.getElementById('error-msg');

      tabLogin.addEventListener('click', () => {
         authMode.value = 'login';
         tabLogin.classList.replace('text-gray-500', 'text-black');
         tabLogin.classList.replace('border-transparent', 'border-black');
         tabRegister.classList.replace('text-black', 'text-gray-500');
         tabRegister.classList.replace('border-black', 'border-transparent');
         registerFields.classList.add('hidden');
         document.getElementById('r-name').removeAttribute('required');
      });

      tabRegister.addEventListener('click', () => {
         authMode.value = 'register';
         tabRegister.classList.replace('text-gray-500', 'text-black');
         tabRegister.classList.replace('border-transparent', 'border-black');
         tabLogin.classList.replace('text-black', 'text-gray-500');
         tabLogin.classList.replace('border-black', 'border-transparent');
         registerFields.classList.remove('hidden');
         document.getElementById('r-name').setAttribute('required', 'true');
      });

      form.addEventListener('submit', async (e) => {
         e.preventDefault();
         errorMsg.classList.add('hidden');
         const email = document.getElementById('email').value;
         const password = document.getElementById('password').value;
         const mode = authMode.value;

         try {
             if (mode === 'login') {
                const { error } = await login(email, password);
                if (error) throw error;
             } else {
                const name = document.getElementById('r-name').value;
                const { error } = await registerUser(email, password, name);
                if (error) throw error;
                alert('Registration successful. You can now login.');
             }
             window.location.href = '/';
         } catch (err) {
             errorMsg.textContent = err.message || 'Authentication error';
             errorMsg.classList.remove('hidden');
         }
      });
      
      // If already logged in, redirect
      setTimeout(() => {
          if(currentUser) window.location.href = '/';
      }, 500);
    </script>
  </body>
</html>
