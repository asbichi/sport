<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Details - BICHI'S WEAR</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="bg-gray-50 text-gray-900 font-sans flex flex-col min-h-screen">
    
    <!-- Premium Graduated Metallic Top Banner -->
    <div class="bg-gradient-to-r from-orange-600 via-amber-500 to-orange-600 text-white text-[10px] font-black uppercase tracking-[0.25em] py-3 text-center w-full z-50 shadow-md">
        ⚡ FREE GLOBAL SHIPPING ON ORDERS OVER $100 | USE CODE: BICHIPRO ⚡
    </div>

    <!-- Luxury Glassmorphism Navbar -->
    <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-100 transition-all duration-300">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-20 items-center">
          <div class="flex items-center">
            <a href="/" class="flex items-center gap-3 group">
              <img src="https://i.ibb.co/bRDvmLgW/cea5b158-4e71-4446-84de-6924e17f2d51.jpg" alt="Logo" class="h-11 w-auto object-contain rounded-xl shadow-md border-2 border-orange-500/10 group-hover:border-orange-500 group-hover:scale-105 transition-all duration-300">
              <span class="text-black font-black uppercase tracking-tighter text-2xl sm:text-3xl font-display group-hover:text-orange-600 transition-colors">BICHI'S <span class="text-orange-500">WEAR</span></span>
            </a>
          </div>
          <div class="hidden md:flex space-x-10 items-center text-xs font-black uppercase tracking-[0.2em] text-gray-800 border-l border-gray-200 pl-10">
            <a href="/shop.html" class="hover:text-orange-600 transition-colors">Shop All</a>
            <a href="/shop.html" class="hover:text-orange-600 transition-colors">New Arrivals</a>
            <a href="/shop.html" class="hover:text-orange-600 transition-colors">Accessories</a>
          </div>
          <div class="flex space-x-6 items-center border-l md:border-l-0 border-gray-200 pl-6 md:pl-0">
            <div class="relative hidden lg:block">
              <input type="text" class="live-search-input bg-gray-100 border-none rounded-full py-1.5 px-4 text-xs font-bold w-40 focus:w-60 transition-all focus:outline-none focus:ring-2 focus:ring-orange-500 text-black placeholder-gray-500" placeholder="Search elite gear...">
              <svg class="w-3.5 h-3.5 absolute right-3 top-2.5 text-gray-500 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
              <div class="search-results-container absolute top-10 right-0 w-72 bg-white border border-gray-100 shadow-2xl rounded-xl z-50 hidden flex-col max-h-[60vh] overflow-y-auto"></div>
            </div>
            <a href="/login.html" id="nav-login" class="text-xs font-black uppercase tracking-widest hover:text-orange-600 transition-colors">Sign In</a>
            <a href="/profile.html" id="nav-profile" class="hidden text-xs font-black uppercase tracking-widest hover:text-orange-600 transition-colors">Profile</a>
            <button id="nav-logout" class="hidden text-xs font-black uppercase tracking-widest text-gray-500 hover:text-red-500 transition-colors">Sign Out</button>
            <a href="/admin.html" id="nav-admin" class="hidden text-[10px] font-black uppercase tracking-widest bg-black text-white px-3 py-1.5 rounded-full hover:bg-gray-800 transition-colors">Admin</a>
            <a href="/cart.html" class="flex items-center hover:text-orange-600 transition-colors group">
              <span class="text-xs font-black uppercase tracking-widest mr-2">Cart</span>
              <span id="cart-count" class="bg-gradient-to-br from-orange-600 to-amber-500 text-white text-[10px] items-center justify-center font-black w-5 h-5 flex rounded-full group-hover:scale-110 transition-transform shadow-md">0</span>
            </a>
          </div>
        </div>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16 md:py-24 flex-grow">
       <div id="product-detail-container" class="min-h-[400px]">
           <div class="py-12 text-center text-gray-500">Loading product...</div>
       </div>
    </div>

    <script type="module" src="/js/firebase.js"></script>
    <script type="module" src="/js/auth.js"></script>
    <script type="module" src="/js/cart.js"></script>
    <script type="module">
      import { firebaseDb } from '/js/firebase.js';
      import { addToCart } from '/js/cart.js';
      
      const container = document.getElementById('product-detail-container');
      const urlParams = new URLSearchParams(window.location.search);
      const productId = urlParams.get('id');

      async function loadProduct() {
          if (!productId) {
              container.innerHTML = '<div class="text-center text-red-500 font-bold py-12">Product not found. <a href="/shop.html" class="underline">Back to Shop</a></div>';
              return;
          }

          try {
             const { data: product, error } = await firebaseDb.getOne('Products', productId);
             if (error || !product) throw error || new Error('Not found');

             container.innerHTML = `
                <div class="mb-8 text-xs font-bold uppercase tracking-widest text-gray-400">
                    <a href="/" class="hover:text-black">Home</a> <span class="mx-2">/</span> 
                    <a href="/shop.html" class="hover:text-black">Shop</a> <span class="mx-2">/</span> 
                    <span class="text-black">${product.product_name}</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-16 items-start">
                   <div class="flex flex-col space-y-4">
                      <div class="rounded-3xl overflow-hidden bg-gray-100 flex items-center justify-center p-8 h-[400px] md:h-[600px] relative">
                         <img id="main-product-image" src="${product.image_url}" alt="${product.product_name}" class="w-full h-full object-contain hover:scale-105 transition-transform duration-700">
                      </div>
                      <div class="flex space-x-4 overflow-x-auto pb-2 scrollbar-hide" id="thumbnail-gallery">
                          <div class="thumbnail w-20 h-20 md:w-24 md:h-24 rounded-2xl overflow-hidden bg-gray-100 cursor-pointer border-2 border-black flex-shrink-0 transition-all opacity-100" data-src="${product.image_url}">
                              <img src="${product.image_url}" class="w-full h-full object-cover">
                          </div>
                          <div class="thumbnail w-20 h-20 md:w-24 md:h-24 rounded-2xl overflow-hidden bg-gray-100 cursor-pointer border-2 border-transparent hover:border-gray-300 flex-shrink-0 transition-all opacity-60 hover:opacity-100" data-src="https://images.unsplash.com/photo-1543326727-cf6c39e8f84c?q=80&w=800&auto=format&fit=crop">
                              <img src="https://images.unsplash.com/photo-1543326727-cf6c39e8f84c?q=80&w=200&auto=format&fit=crop" class="w-full h-full object-cover">
                          </div>
                          <div class="thumbnail w-20 h-20 md:w-24 md:h-24 rounded-2xl overflow-hidden bg-gray-100 cursor-pointer border-2 border-transparent hover:border-gray-300 flex-shrink-0 transition-all opacity-60 hover:opacity-100" data-src="https://images.unsplash.com/photo-1587329310686-91414b8e3cb7?q=80&w=800&auto=format&fit=crop">
                              <img src="https://images.unsplash.com/photo-1587329310686-91414b8e3cb7?q=80&w=200&auto=format&fit=crop" class="w-full h-full object-cover">
                          </div>
                          <div class="thumbnail w-20 h-20 md:w-24 md:h-24 rounded-2xl overflow-hidden bg-gray-100 cursor-pointer border-2 border-transparent hover:border-gray-300 flex-shrink-0 transition-all opacity-60 hover:opacity-100" data-src="https://images.unsplash.com/photo-1518605368461-1ee71168f8af?q=80&w=800&auto=format&fit=crop">
                              <img src="https://images.unsplash.com/photo-1518605368461-1ee71168f8af?q=80&w=200&auto=format&fit=crop" class="w-full h-full object-cover">
                          </div>
                      </div>
                   </div>
                   <div class="flex flex-col">
                      <div class="uppercase tracking-widest text-gray-500 font-bold text-sm mb-4 border-b border-gray-200 pb-4 flex justify-between">
                          <span>${product.category}</span>
                          <a href="#" onclick="alert('Size Guide: Standard athletic fit. We recommend sizing up for a looser fit.')" class="hover:text-black border-b border-gray-300 hover:border-black transition-colors">Size Guide & Fit</a>
                      </div>
                      <h1 class="text-4xl md:text-5xl font-black uppercase italic tracking-tighter mb-6 text-gray-900 leading-none">${product.product_name}</h1>
                      
                      <div class="mb-8">
                         <span class="inline-block px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest ${product.stock_quantity > 0 ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                            ${product.stock_quantity > 0 ? 'In Stock (' + product.stock_quantity + ' available)' : 'Out of Stock'}
                         </span>
                      </div>

                      <p class="text-gray-600 text-lg mb-10 leading-relaxed font-medium">
                         ${product.description || 'No description available for this product.'}
                      </p>

                      <div class="mt-auto flex flex-col sm:flex-row gap-4">
                         <div class="flex border-2 border-gray-200 rounded-full overflow-hidden w-32">
                             <input type="number" id="qty" min="1" max="${product.stock_quantity || 1}" value="1" class="w-full p-4 text-center text-xl font-bold border-none outline-none bg-transparent" ${product.stock_quantity <= 0 ? 'disabled' : ''}>
                         </div>
                         
                         <button id="add-btn" class="flex-grow bg-black hover:bg-orange-600 hover:text-white text-white font-black uppercase tracking-widest py-4 px-8 rounded-full transition-all duration-300 transform hover:-translate-y-1 shadow-lg hover:shadow-xl" ${product.stock_quantity <= 0 ? 'disabled' : ''}>
                            ${product.stock_quantity > 0 ? 'Add to Cart' : 'Sold Out'}
                         </button>
                      </div>
                   </div>
                </div>

                <!-- Reviews Section -->
                <div class="mt-24 border-t border-gray-100 pt-16">
                   <h2 class="text-3xl font-black uppercase italic tracking-tighter mb-8 text-gray-900">Customer Reviews</h2>
                   
                   <div id="reviews-container" class="space-y-6 mb-12">
                      <div class="text-gray-500 text-sm font-bold uppercase tracking-widest">Loading reviews...</div>
                   </div>

                   <div class="bg-gray-50 p-8 rounded-3xl">
                      <h3 class="text-xl font-bold uppercase tracking-widest mb-6">Write a Review</h3>
                      <form id="review-form" class="space-y-4">
                         <div>
                             <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Rating</label>
                             <div class="flex space-x-2 text-3xl text-gray-300 cursor-pointer" id="star-rating">
                                 <span data-val="1" class="star hover:text-yellow-400 transition-colors text-yellow-400">★</span>
                                 <span data-val="2" class="star hover:text-yellow-400 transition-colors text-yellow-400">★</span>
                                 <span data-val="3" class="star hover:text-yellow-400 transition-colors text-yellow-400">★</span>
                                 <span data-val="4" class="star hover:text-yellow-400 transition-colors text-yellow-400">★</span>
                                 <span data-val="5" class="star hover:text-yellow-400 transition-colors text-yellow-400">★</span>
                             </div>
                             <input type="hidden" id="review-rating" value="5">
                         </div>
                         <div>
                             <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Your Name</label>
                             <input type="text" id="review-name" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm font-bold focus:outline-none focus:ring-2 focus:ring-black transition-all" required placeholder="John Doe">
                         </div>
                         <div>
                             <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Feedback</label>
                             <textarea id="review-text" rows="4" class="w-full bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm font-medium focus:outline-none focus:ring-2 focus:ring-black transition-all resize-none" required placeholder="What did you think about this product?"></textarea>
                         </div>
                         <button type="submit" class="bg-black text-white font-bold uppercase tracking-widest text-xs px-8 py-4 rounded-full hover:bg-orange-600 hover:text-white transition-colors w-full sm:w-auto">Submit Review</button>
                      </form>
                   </div>
                </div>
             `;

             const addBtn = document.getElementById('add-btn');
             if (addBtn && product.stock_quantity > 0) {
                 addBtn.addEventListener('click', () => {
                     const qty = parseInt(document.getElementById('qty').value, 10);
                     addToCart(product, qty);
                 });
             }

             initReviews();
             initGallery();

          } catch (e) {
             console.error(e);
             container.innerHTML = '<div class="text-center text-red-500 font-bold py-12">Product could not be loaded. <a href="/shop.html" class="underline">Back to Shop</a></div>';
          }
      }

      function initGallery() {
          const mainImage = document.getElementById('main-product-image');
          const thumbnails = document.querySelectorAll('.thumbnail');

          thumbnails.forEach(thumb => {
              thumb.addEventListener('click', () => {
                  const src = thumb.getAttribute('data-src');
                  mainImage.src = src;

                  thumbnails.forEach(t => {
                      t.classList.remove('border-black', 'opacity-100');
                      t.classList.add('border-transparent', 'opacity-60');
                      t.classList.remove('hover:border-transparent');
                  });

                  thumb.classList.add('border-black', 'opacity-100');
                  thumb.classList.remove('border-transparent', 'opacity-60');
              });
          });
      }

      function initReviews() {
          const stars = document.querySelectorAll('.star');
          const ratingInput = document.getElementById('review-rating');
          
          stars.forEach(star => {
              star.addEventListener('click', () => {
                  const val = parseInt(star.getAttribute('data-val'));
                  ratingInput.value = val;
                  stars.forEach(s => {
                      if (parseInt(s.getAttribute('data-val')) <= val) {
                          s.classList.add('text-yellow-400');
                          s.classList.remove('text-gray-300');
                      } else {
                          s.classList.remove('text-yellow-400');
                          s.classList.add('text-gray-300');
                      }
                  });
              });
          });

          const form = document.getElementById('review-form');
          form.addEventListener('submit', async (e) => {
              e.preventDefault();
              const rating = parseInt(ratingInput.value);
              const name = document.getElementById('review-name').value.trim();
              const text = document.getElementById('review-text').value.trim();
              
              if (!name || !text) return;
              
              const submitBtn = form.querySelector('button[type="submit"]');
              const originalBtnText = submitBtn.innerText;
              submitBtn.innerText = 'Submitting...';
              submitBtn.disabled = true;

              const reviewData = {
                  product_id: productId,
                  reviewer_name: name,
                  rating: rating,
                  comment: text,
                  created_at: new Date().toISOString()
              };

              try {
                  const { error } = await firebaseDb.insert('Reviews', reviewData);
                  if (error) throw error;
              } catch (err) {
                  console.warn("Could not save to Supabase Reviews table, using localStorage fallback", err);
                  // fallback
                  const fallbackData = JSON.parse(localStorage.getItem('bichi_reviews') || '[]');
                  fallbackData.push(reviewData);
                  localStorage.setItem('bichi_reviews', JSON.stringify(fallbackData));
              }

              form.reset();
              submitBtn.innerText = originalBtnText;
              submitBtn.disabled = false;
              ratingInput.value = 5;
              stars.forEach(s => s.classList.add('text-yellow-400'));
              
              loadReviews();
          });

          loadReviews();
      }

      async function loadReviews() {
          const reviewsContainer = document.getElementById('reviews-container');
          
          let reviews = [];
          try {
              const { data, error } = await firebaseDb.query('Reviews', [['product_id', '==', productId]]);
              if (data) {
                  data.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
              }
                  
              if (error) throw error;
              if (data) reviews = data;
          } catch (err) {
              const fallbackData = JSON.parse(localStorage.getItem('bichi_reviews') || '[]');
              reviews = fallbackData.filter(r => r.product_id === productId).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
          }

          if (reviews.length === 0) {
              reviewsContainer.innerHTML = '<div class="text-gray-500 text-sm font-bold uppercase tracking-widest py-8">No reviews yet. Be the first to review!</div>';
              return;
          }

          reviewsContainer.innerHTML = reviews.map(r => `
              <div class="bg-white border text-left border-gray-100 rounded-2xl p-6 shadow-sm">
                  <div class="flex items-center justify-between mb-3">
                      <div class="font-bold text-gray-900">${escapeHtml(r.reviewer_name)}</div>
                      <div class="flex text-yellow-400 text-sm">
                         ${'★'.repeat(r.rating)}${'<span class="text-gray-200">★</span>'.repeat(5 - r.rating)}
                      </div>
                  </div>
                  <p class="text-gray-600 text-sm font-medium leading-relaxed">${escapeHtml(r.comment)}</p>
                  <div class="text-[10px] uppercase font-bold tracking-widest text-gray-400 mt-4">${new Date(r.created_at).toLocaleDateString()}</div>
              </div>
          `).join('');
      }

      function escapeHtml(unsafe) {
          if (!unsafe) return "";
          return unsafe
               .toString()
               .replace(/&/g, "&amp;")
               .replace(/</g, "&lt;")
               .replace(/>/g, "&gt;")
               .replace(/"/g, "&quot;")
               .replace(/'/g, "&#039;");
      }

      document.addEventListener('DOMContentLoaded', loadProduct);
    </script>
  </body>
</html>
